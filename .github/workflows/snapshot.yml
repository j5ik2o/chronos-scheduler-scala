name: Snapshot
on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
jobs:
  snapshot:
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' }}
    env:
      JAVA_OPTS: -Xms2048M -Xmx2048M -Xss6M -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8
      JVM_OPTS:  -Xms2048M -Xmx2048M -Xss6M -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
      PGP_SECRET: ${{ secrets.PGP_SECRET }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.workflow_run.head_branch }}
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'sbt'
    - uses: sbt/setup-sbt@v1
    - name: Configure Sonatype credentials
      run: |
        mkdir -p ~/.sbt/1.0
        printf 'host=central.sonatype.com\nuser=%s\npassword=%s\n' \
          "$SONATYPE_USERNAME" "$SONATYPE_PASSWORD" > ~/.sbt/1.0/sonatype_credentials
    - name: Import GPG key
      run: |
        mkdir -p ~/.gnupg
        chmod 700 ~/.gnupg
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        echo "use-agent" >> ~/.gnupg/gpg.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
        chmod 600 ~/.gnupg/gpg.conf ~/.gnupg/gpg-agent.conf
        gpgconf --kill gpg-agent
        gpgconf --launch gpg-agent
        echo "$PGP_SECRET" | base64 -d | gpg --batch --import
        gpg --list-secret-keys
    - name: Publish Snapshot
      run: |
        sbt \
          "set every pgpPassphrase := Some(sys.env(\"PGP_PASSPHRASE\").toCharArray)" \
          'set every publishTo := Some("central-snapshots" at "https://central.sonatype.com/repository/maven-snapshots/")' \
          +publishSigned
